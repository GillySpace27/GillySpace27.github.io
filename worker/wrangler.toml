# Cloudflare Worker config for enso-impressions.
# Workers Builds reads this file at deploy time from the repo root directory
# (which you'll point at "worker/" in the dashboard). No CLI use required.

name = "enso-impressions"
main = "worker.js"
compatibility_date = "2024-12-01"

# Enables your free *.workers.dev subdomain. The URL printed in the dashboard
# after the first build is what you'll paste into IMPRESSIONS_WORKER_URL in
# enso/index.html (the calendar).
workers_dev = true

# Workers AI binding — gives the worker access to env.AI.run(<model>, {...}).
# No external API key needed. Free tier: 100,000 requests/day.
[ai]
binding = "AI"

# KV namespace for caching impressions by date. We rotated to a fresh
# namespace (IMPRESSIONS_v2) when the prompt voice changed substantively —
# the previous one held haiku written under the earlier (Llama-era / pre-
# meditative-primer) prompt. New namespace ID is the live target; the old
# namespace was deleted via the Cloudflare MCP after this swap deployed.
[[kv_namespaces]]
binding = "IMPRESSIONS"
id = "f1e2708827c741438de73344eb778390"
